[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536

[profile.ci.fuzz]
runs = 10000

[fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "all_params"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true
